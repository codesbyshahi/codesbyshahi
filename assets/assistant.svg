<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">

  <style>
    .bg {
      fill:#0d1117;
    }

    .bubble{
      fill:#161b22;
      stroke:#3b82f6;
      stroke-width:2;
      rx:15;
    }

    .text{
      fill:#f5f5f5;
      font-family:Arial,Helvetica,sans-serif;
    }

    .title{
      font-size:26px;
      font-weight:bold;
    }

    .body{
      font-size:16px;
    }

    .hoodie{
      fill:#111827;
    }

    .skin{
      fill:#e8be9a;
    }

    .hair{
      fill:#1a1a1a;
    }

    .laptop{
      fill:#2f3542;
    }

    .screen{
      fill:#0b1220;
      stroke:#3b82f6;
      stroke-width:2;
    }

    .code{
      fill:#4ade80;
      font-family:monospace;
      font-size:12px;
    }

    .cursor{
      animation:blink 1s infinite;
    }

    .wave{
      transform-origin:360px 220px;
      animation:wave 2.5s infinite;
    }

    .eyes{
      animation:blinkEyes 4s infinite;
    }

    @keyframes blink{
      50%{
        opacity:0;
      }
    }

    @keyframes wave{
      0%{transform:rotate(0deg);}
      15%{transform:rotate(-18deg);}
      30%{transform:rotate(10deg);}
      45%{transform:rotate(-10deg);}
      60%{transform:rotate(6deg);}
      100%{transform:rotate(0deg);}
    }

    @keyframes blinkEyes{
      0%,92%,100%{
        transform:scaleY(1);
      }
      94%,96%{
        transform:scaleY(0.1);
      }
    }
  </style>

  <rect class="bg" width="900" height="420"/>

  <!-- Speech Bubble -->
  <rect class="bubble" x="40" y="40" width="420" height="130" rx="18"/>

  <text class="text title" x="65" y="80">
    👋 Hello, Developer!
  </text>

  <text class="text body" x="65" y="110">
    I'm Shahi.
  </text>

  <text class="text body" x="65" y="135">
    Welcome to my GitHub.
  </text>

  <text class="text body" x="65" y="160">
    Thanks for visiting!
  </text>

  <!-- Head -->
  <circle class="skin" cx="640" cy="140" r="42"/>

  <!-- Curly Hair -->
  <g class="hair">
    <circle cx="610" cy="110" r="12"/>
    <circle cx="625" cy="100" r="13"/>
    <circle cx="640" cy="95" r="14"/>
    <circle cx="656" cy="98" r="13"/>
    <circle cx="672" cy="108" r="12"/>
    <circle cx="620" cy="125" r="10"/>
    <circle cx="660" cy="123" r="10"/>
  </g>

  <!-- Eyes -->
  <g class="eyes">
    <ellipse cx="628" cy="142" rx="3" ry="5" fill="#000"/>
    <ellipse cx="652" cy="142" rx="3" ry="5" fill="#000"/>
  </g>

  <!-- Smile -->
  <path d="M628 160 Q640 170 652 160"
        stroke="#000"
        stroke-width="2"
        fill="none"/>

  <!-- Hoodie -->
  <path class="hoodie"
        d="M590 185
           Q640 170 690 185
           L710 300
           L570 300 Z"/>

  <!-- Waving Arm -->
  <g class="wave">
    <line x1="595" y1="205"
          x2="545" y2="160"
          stroke="#111827"
          stroke-width="14"
          stroke-linecap="round"/>

    <circle class="skin"
            cx="535"
            cy="150"
            r="12"/>
  </g>

  <!-- Other Arm -->
  <line x1="685"
        y1="205"
        x2="735"
        y2="235"
        stroke="#111827"
        stroke-width="14"
        stroke-linecap="round"/>

  <!-- Laptop -->
  <rect class="screen"
        x="675"
        y="230"
        width="150"
        height="90"
        rx="8"/>

  <rect class="laptop"
        x="660"
        y="320"
        width="180"
        height="10"
        rx="5"/>

  <text class="code"
        x="688"
        y="255">
    &gt; npm run dev
  </text>

  <text class="code"
        x="688"
        y="275">
    IMS
  </text>

  <text class="code cursor"
        x="688"
        y="295">
    █
  </text>

</svg>
